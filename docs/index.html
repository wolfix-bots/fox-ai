<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Foxy — Static Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Foxy</h1>
      <p class="sub">Ask Foxy anything — powered by an external AI API</p>
    </header>

    <section id="messages" class="messages" aria-live="polite"></section>

    <form id="chatForm" class="inputBar">
      <textarea id="messageInput" placeholder="Ask Foxy anything..." rows="1" aria-label="Message"></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
